<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Tutoring — Sasha Bagrov{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/tutoring.css') }}">
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="tutoring-nav">
        <a href="/" class="nav-back">&larr; portfolio</a>
        <div class="nav-links">
            <a href="/tutoring/book">book</a>
            {% if logged_in %}
                <a href="/tutoring/account">account</a>
                {% if is_admin %}
                    <a href="/tutoring/admin">admin</a>
                {% endif %}
                <a href="#" id="logout-link">logout</a>
            {% else %}
                <a href="/tutoring/auth">login</a>
            {% endif %}
        </div>
    </nav>

    <main class="tutoring-main">
        {% block content %}{% endblock %}
    </main>

    <script>
        window.__FIREBASE_CONFIG__ = {{ firebase_config | tojson }};
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/gsap.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var logoutLink = document.getElementById('logout-link');
            if (logoutLink) {
                logoutLink.addEventListener('click', function(e) {
                    e.preventDefault();
                    fetch('/tutoring/logout', { method: 'POST' })
                        .then(function() { window.location.href = '/tutoring/book'; });
                });
            }
        });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
