{% extends "tutoring_base.html" %}
{% block title %}Login — Sasha Bagrov Tutoring{% endblock %}

{% block content %}
<div class="auth-page">
    <h1 class="heading">welcome.</h1>
    <p class="subtitle" id="auth-subtitle">sign in to book sessions and manage your account.</p>

    <div class="auth-form-container">
        <div class="auth-tabs">
            <button class="auth-tab active" data-mode="login">login</button>
            <button class="auth-tab" data-mode="register">register</button>
        </div>

        <form class="auth-form" id="auth-form">
            <div class="form-group" id="name-group" style="display:none;">
                <label for="auth-name">name</label>
                <input type="text" id="auth-name" placeholder="your name" autocomplete="name">
            </div>
            <div class="form-group">
                <label for="auth-email">email</label>
                <input type="email" id="auth-email" placeholder="you@example.com" required autocomplete="email">
            </div>
            <div class="form-group">
                <label for="auth-password">password</label>
                <input type="password" id="auth-password" placeholder="your password" required autocomplete="current-password" minlength="6">
            </div>
            <div class="auth-error" id="auth-error"></div>
            <button type="submit" class="btn btn-primary btn-full" id="auth-submit">login</button>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/tutoring_auth.js') }}"></script>
{% endblock %}
